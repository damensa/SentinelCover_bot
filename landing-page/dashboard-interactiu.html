<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelAdmin Dashboard - Interactiu</title>
    <!-- Llibreries externes via CDN per a interactivitat total -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Component d'Icona per a Lucide
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard'); // 'dashboard', 'tramits', 'associats'
            const [filter, setFilter] = useState('Tots');
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedTramit, setSelectedTramit] = useState(null);

            // Dades de Tràmits
            const [tramits, setTramits] = useState([
                { id: 'TR-9012', data: '09/03/24', nom: 'Joan Garcia', tipus: 'ELEC-1', estat: 'Pendent', localitat: 'Sabadell', potencia: '5.75 kW' },
                { id: 'TR-9011', data: '09/03/24', nom: 'Marta Rovira', tipus: 'RITE', estat: 'Validat', localitat: 'Granollers', potencia: '24 kW' },
                { id: 'TR-9010', data: '09/03/24', nom: 'Pere Soler', tipus: 'Aigua', estat: 'Enviat', localitat: 'Terrassa', potencia: 'N/A' },
                { id: 'TR-9009', data: '08/03/24', nom: 'Carles Font', tipus: 'ELEC-1', estat: 'Error', localitat: 'Mollet', potencia: '9.2 kW' },
                { id: 'TR-8995', data: '07/03/24', nom: 'Lluís Beltran', tipus: 'RITE', estat: 'Pendent', localitat: 'Vic', potencia: '35 kW' },
            ]);

            // Dades d'Associats
            const associats = [
                { id: 'INST-001', nom: 'Joan Garcia', empresa: 'Instal·lacions Garcia SL', carnet: '23445-B', estat: 'Actiu' },
                { id: 'INST-002', nom: 'Marta Rovira', empresa: 'Energies del Vallès', carnet: '99821-E', estat: 'Actiu' },
                { id: 'INST-003', nom: 'Pere Soler', empresa: 'Soler & Fills', carnet: '11203-A', estat: 'Actiu' },
                { id: 'INST-004', nom: 'Carles Font', empresa: 'Font Fred i Calor', carnet: '88722-R', estat: 'Inactiu' },
                { id: 'INST-005', nom: 'Lluís Beltran', empresa: 'Reformes Beltran', carnet: '33411-B', estat: 'Actiu' },
            ];

            const filteredTramits = useMemo(() => {
                return tramits.filter(t => {
                    const matchesFilter = filter === 'Tots' || t.tipus === filter;
                    const matchesSearch = t.nom.toLowerCase().includes(searchTerm.toLowerCase()) || t.id.includes(searchTerm);
                    return matchesFilter && matchesSearch;
                });
            }, [filter, searchTerm, tramits]);

            const stats = {
                pendents: tramits.filter(t => t.estat === 'Pendent').length,
                enviats: tramits.filter(t => t.estat === 'Enviat').length,
                errors: tramits.filter(t => t.estat === 'Error').length,
                socis: associats.length
            };

            const handleValidar = (id) => {
                setTramits(prev => prev.map(t => t.id === id ? { ...t, estat: 'Enviat' } : t));
                setSelectedTramit(null);
            };

            return (
                <div className="flex h-screen w-full overflow-hidden bg-slate-50">
                    {/* Sidebar */}
                    <aside className="w-64 bg-slate-900 text-white flex flex-col shrink-0">
                        <div className="p-6 flex items-center gap-3 border-b border-slate-800">
                            <div className="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-500/20 text-white">
                                <Icon name="shield-check" size={20} />
                            </div>
                            <span className="text-xl font-bold tracking-tight">Sentinel<span className="text-blue-400">Admin</span></span>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            <button
                                onClick={() => setView('dashboard')}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition ${view === 'dashboard' ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/40' : 'text-slate-400 hover:bg-slate-800'}`}
                            >
                                <Icon name="layout-dashboard" size={18} /> Dashboard
                            </button>
                            <button
                                onClick={() => setView('tramits')}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition ${view === 'tramits' ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/40' : 'text-slate-400 hover:bg-slate-800'}`}
                            >
                                <Icon name="file-text" size={18} /> Tràmits
                            </button>
                            <button
                                onClick={() => setView('associats')}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition ${view === 'associats' ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/40' : 'text-slate-400 hover:bg-slate-800'}`}
                            >
                                <Icon name="users" size={18} /> Associats
                            </button>
                        </nav>
                        <div className="p-6 border-t border-slate-800 text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                            Effiguard Tech SL © 2026
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col overflow-hidden">
                        {/* Header Comú */}
                        <header className="h-20 bg-white border-b border-slate-200 px-8 flex justify-between items-center shrink-0">
                            <div>
                                <h1 className="text-xl font-black text-slate-800 capitalize">{view}</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Gremi d'Instal·ladors</p>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="relative group">
                                    <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16} />
                                    <input
                                        type="text"
                                        placeholder="Cerca..."
                                        className="pl-10 pr-4 py-2 bg-slate-100 border-none rounded-xl text-xs w-64 outline-none focus:ring-2 focus:ring-blue-500/20 focus:bg-white transition-all"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                                <div className="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center text-white font-bold shadow-md">FV</div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 space-y-8 custom-scrollbar">

                            {/* VISTA: DASHBOARD */}
                            {view === 'dashboard' && (
                                <React.Fragment>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        {[
                                            { l: 'Pendents', v: stats.pendents, c: 'text-amber-600', b: 'bg-amber-50', i: 'clock' },
                                            { l: 'Enviats', v: stats.enviats, c: 'text-emerald-600', b: 'bg-emerald-50', i: 'check-circle-2' },
                                            { l: 'Errors', v: stats.errors, c: 'text-rose-600', b: 'bg-rose-50', i: 'alert-circle' },
                                            { l: 'Socis', v: stats.socis, c: 'text-blue-600', b: 'bg-blue-50', i: 'users' }
                                        ].map((s, idx) => (
                                            <div key={idx} className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4 hover:shadow-md transition-shadow">
                                                <div className={`${s.b} ${s.c} p-3 rounded-xl`}><Icon name={s.i} /></div>
                                                <div>
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase leading-none mb-1">{s.l}</p>
                                                    <p className="text-2xl font-black text-slate-800">{s.v}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                                        <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
                                            <h2 className="font-bold text-slate-800">Tràmits Recents</h2>
                                            <button onClick={() => setView('tramits')} className="text-xs font-bold text-blue-600 hover:underline">Veure-ho tot</button>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead className="bg-slate-50/50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                                    <tr>
                                                        <th className="px-8 py-5">Ref / Data</th>
                                                        <th className="px-8 py-5">Instal·lador</th>
                                                        <th className="px-8 py-5 text-right">Accions</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {tramits.slice(0, 3).map(t => (
                                                        <tr key={t.id} className="group hover:bg-blue-50/30 transition-colors">
                                                            <td className="px-8 py-5">
                                                                <div className="font-bold text-sm">{t.id}</div>
                                                                <div className="text-[10px] text-slate-400">{t.data}</div>
                                                            </td>
                                                            <td className="px-8 py-5">
                                                                <div className="text-sm font-bold text-slate-700">{t.nom}</div>
                                                            </td>
                                                            <td className="px-8 py-5 text-right">
                                                                <button onClick={() => setSelectedTramit(t)} className="text-blue-600 hover:text-blue-800 font-bold text-[10px] uppercase">Gestionar</button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    <div className="bg-gradient-to-r from-blue-900 to-indigo-900 rounded-[2.5rem] p-10 text-white flex flex-col md:flex-row items-center justify-between gap-8 shadow-2xl relative overflow-hidden group">
                                        <div className="relative z-10 space-y-4">
                                            <h3 className="text-3xl font-black leading-tight">Sincronització Automàtica</h3>
                                            <p className="text-blue-100/70 text-sm max-w-xl font-medium">Hi ha {stats.pendents} tràmits llestos per ser enviats a la Generalitat.</p>
                                        </div>
                                        <button className="relative z-10 bg-white text-blue-900 px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:scale-105 active:scale-95 transition-all shadow-xl flex items-center gap-3">
                                            <Icon name="send" size={18} className="text-blue-600" /> Enviar ara
                                        </button>
                                        <div className="absolute right-0 top-0 bottom-0 w-64 bg-blue-500/10 skew-x-12 translate-x-32"></div>
                                    </div>
                                </React.Fragment>
                            )}

                            {/* VISTA: TRÀMITS (Detallada) */}
                            {view === 'tramits' && (
                                <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                                    <div className="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                                        <h2 className="font-bold text-slate-800 text-lg">Cua Completa de Documents</h2>
                                        <div className="flex bg-slate-100 p-1 rounded-xl">
                                            {['Tots', 'ELEC-1', 'RITE', 'Aigua'].map(t => (
                                                <button
                                                    key={t}
                                                    onClick={() => setFilter(t)}
                                                    className={`px-4 py-1.5 rounded-lg text-[10px] font-bold transition-all ${filter === t ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}
                                                >
                                                    {t}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50/50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                                <tr>
                                                    <th className="px-8 py-5">Referència</th>
                                                    <th className="px-8 py-5">Instal·lador</th>
                                                    <th className="px-8 py-5">Tipus / Zona</th>
                                                    <th className="px-8 py-5">Estat</th>
                                                    <th className="px-8 py-5 text-right">Acció</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {filteredTramits.map(t => (
                                                    <tr key={t.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="px-8 py-5 font-bold text-sm">{t.id}</td>
                                                        <td className="px-8 py-5 font-medium text-slate-700">{t.nom}</td>
                                                        <td className="px-8 py-5">
                                                            <div className="text-xs font-bold">{t.tipus}</div>
                                                            <div className="text-[10px] text-slate-400 uppercase">{t.localitat}</div>
                                                        </td>
                                                        <td className="px-8 py-5">
                                                            <span className={`px-2.5 py-1 rounded-full text-[9px] font-black border uppercase
                                                                ${t.estat === 'Pendent' ? 'bg-amber-100 text-amber-700 border-amber-200' :
                                                                    t.estat === 'Enviat' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' :
                                                                        'bg-rose-100 text-rose-700 border-rose-200'}`}>
                                                                {t.estat}
                                                            </span>
                                                        </td>
                                                        <td className="px-8 py-5 text-right">
                                                            <button onClick={() => setSelectedTramit(t)} className="bg-blue-50 text-blue-600 p-2 rounded-lg hover:bg-blue-600 hover:text-white transition-all">
                                                                <Icon name="eye" size={16} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* VISTA: ASSOCIATS */}
                            {view === 'associats' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {associats.map(socari => (
                                        <div key={socari.id} className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm flex flex-col gap-4 group hover:border-blue-500 transition-all">
                                            <div className="flex justify-between items-start">
                                                <div className="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center font-black text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors">
                                                    {socari.nom.split(' ').map(n => n[0]).join('')}
                                                </div>
                                                <span className={`px-2 py-0.5 rounded-full text-[9px] font-black uppercase border ${socari.estat === 'Actiu' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-rose-50 text-rose-600 border-rose-100'}`}>
                                                    {socari.estat}
                                                </span>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-slate-800">{socari.nom}</h3>
                                                <p className="text-xs text-slate-500">{socari.empresa}</p>
                                            </div>
                                            <div className="pt-4 border-t border-slate-50 flex justify-between items-center">
                                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Carnet: {socari.carnet}</div>
                                                <button className="p-2 text-slate-300 hover:text-blue-600"><Icon name="more-horizontal" size={16} /></button>
                                            </div>
                                        </div>
                                    ))}
                                    {/* Botó per afegir associat */}
                                    <button className="border-2 border-dashed border-slate-200 rounded-[2rem] p-6 flex flex-col items-center justify-center gap-2 text-slate-400 hover:border-blue-300 hover:text-blue-500 transition-all">
                                        <Icon name="user-plus" size={24} />
                                        <span className="text-xs font-bold uppercase tracking-widest">Alta Nou Associat</span>
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* MODAL DETALL (Comú) */}
                        {selectedTramit && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                                <div className="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200">
                                    <div className="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                        <h3 className="text-xl font-black text-slate-800">Tràmit {selectedTramit.id}</h3>
                                        <button onClick={() => setSelectedTramit(null)} className="p-2 hover:bg-slate-200 rounded-full transition-colors"><Icon name="x" size={20} /></button>
                                    </div>
                                    <div className="p-8 space-y-6">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><p className="text-[10px] font-bold text-slate-400 uppercase">Instal·lador</p><p className="font-bold">{selectedTramit.nom}</p></div>
                                            <div><p className="text-[10px] font-bold text-slate-400 uppercase">Localitat</p><p className="font-bold">{selectedTramit.localitat}</p></div>
                                            <div><p className="text-[10px] font-bold text-slate-400 uppercase">Tipus</p><p className="font-bold">{selectedTramit.tipus}</p></div>
                                            <div><p className="text-[10px] font-bold text-slate-400 uppercase">Dades</p><p className="font-bold">{selectedTramit.potencia}</p></div>
                                        </div>
                                        {selectedTramit.estat === 'Pendent' && (
                                            <button onClick={() => handleValidar(selectedTramit.id)} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">
                                                Validar i Enviar a Administració
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
